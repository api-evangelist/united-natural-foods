naftiko: "1.0.0-alpha1"

info:
  label: "UNFI Supplier and Data API"
  description: "United Natural Foods (UNFI) Supplier API for product catalog management, purchase orders, fulfillment, and supply chain analytics."
  tags:
    - Food Distribution
    - Supply Chain
    - Wholesale
    - Natural Foods
    - Analytics
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNFI_API_KEY: UNFI_API_KEY

capability:
  consumes:
    - type: http
      namespace: unfi-supplier
      baseUri: https://api.unfi.com/v1
      description: "UNFI Supplier and Data API for product, order, and insights management."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{UNFI_API_KEY}}"
        placement: header
      resources:
        - name: products
          path: /products
          description: "Product catalog management"
          operations:
            - name: list-products
              method: GET
              description: "Retrieve paginated list of products in UNFI catalog"
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: "Product category filter"
                - name: certification
                  in: query
                  type: string
                  required: false
                  description: "Filter by certification (organic, non-gmo, etc.)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-product
              method: POST
              description: "Submit a new product listing to UNFI catalog"
              inputParameters:
                - name: upc
                  in: body
                  type: string
                  required: true
                  description: "Universal Product Code"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Product name"
                - name: brand
                  in: body
                  type: string
                  required: true
                  description: "Brand name"
                - name: category
                  in: body
                  type: string
                  required: true
                  description: "Product category"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-product
              method: GET
              description: "Retrieve details for a specific product"
              inputParameters:
                - name: productId
                  in: path
                  type: string
                  required: true
                  description: "UNFI product identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-product
              method: PUT
              description: "Update an existing product listing"
              inputParameters:
                - name: productId
                  in: path
                  type: string
                  required: true
                  description: "UNFI product identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: orders
          path: /orders
          description: "Purchase order management"
          operations:
            - name: list-orders
              method: GET
              description: "Retrieve purchase orders for the account"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by order status"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date filter"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-order
              method: GET
              description: "Retrieve details for a specific purchase order"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Purchase order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-fulfillment
              method: POST
              description: "Submit fulfillment information for a purchase order"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Purchase order identifier"
                - name: shipDate
                  in: body
                  type: string
                  required: true
                  description: "Ship date"
                - name: carrier
                  in: body
                  type: string
                  required: true
                  description: "Carrier name"
                - name: trackingNumber
                  in: body
                  type: string
                  required: true
                  description: "Tracking number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: insights
          path: /insights
          description: "Supply chain analytics and reporting"
          operations:
            - name: get-sales-insights
              method: GET
              description: "Retrieve sales analytics across UNFI distribution network"
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date for insights query"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End date for insights query"
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "Data aggregation granularity"
                - name: region
                  in: query
                  type: string
                  required: false
                  description: "Distribution region (east, west, all)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-fill-rates
              method: GET
              description: "Retrieve fill rate metrics for supplier products"
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-inventory-insights
              method: GET
              description: "Retrieve inventory levels, voids, and food waste data"
              inputParameters:
                - name: warehouseId
                  in: query
                  type: string
                  required: false
                  description: "Filter by UNFI warehouse"
                - name: asOf
                  in: query
                  type: string
                  required: false
                  description: "Inventory snapshot date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: suppliers
          path: /suppliers
          description: "Supplier profile management"
          operations:
            - name: get-supplier
              method: GET
              description: "Retrieve supplier profile"
              inputParameters:
                - name: supplierId
                  in: path
                  type: string
                  required: true
                  description: "UNFI supplier identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-supplier
              method: PUT
              description: "Update supplier contact and warehouse information"
              inputParameters:
                - name: supplierId
                  in: path
                  type: string
                  required: true
                  description: "UNFI supplier identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: unfi-supplier-api
      resources:
        - path: /v1/products
          name: products
          description: "Product catalog"
          operations:
            - method: GET
              name: list-products
              description: "List UNFI products"
              call: "unfi-supplier.list-products"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders
          name: orders
          description: "Purchase orders"
          operations:
            - method: GET
              name: list-orders
              description: "List purchase orders"
              call: "unfi-supplier.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/insights/sales
          name: sales-insights
          description: "Sales analytics"
          operations:
            - method: GET
              name: get-sales-insights
              description: "Get sales insights"
              call: "unfi-supplier.get-sales-insights"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: unfi-supplier-mcp
      transport: http
      tools:
        - name: list-products
          description: "List UNFI product catalog with filtering by category and certification"
          hints:
            readOnly: true
            openWorld: true
          call: "unfi-supplier.list-products"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-sales-insights
          description: "Get sales analytics across UNFI distribution network"
          hints:
            readOnly: true
            openWorld: false
          call: "unfi-supplier.get-sales-insights"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-orders
          description: "List purchase orders for the supplier account"
          hints:
            readOnly: true
            openWorld: false
          call: "unfi-supplier.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
