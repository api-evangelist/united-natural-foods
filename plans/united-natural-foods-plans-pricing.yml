description: United Natural Foods (UNFI) does not publish a self-serve API pricing page. EDI, ordering,
  catalog, and supply-chain integrations are part of the wholesale customer relationship rather than
  a developer product.
sources:
  - https://www.unfi.com
notes: No public API pricing page exists. Customer-facing integration access (catalog, ordering, EDI)
  is contracted with the wholesale customer relationship; supplier integrations are managed under
  vendor agreements.
