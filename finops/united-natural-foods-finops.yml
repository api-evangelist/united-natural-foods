meters:
  - name: customer_agreement
    description: API / EDI access bundled with the UNFI wholesale customer or supplier agreement.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: API/EDI consumption is not separately metered. Track integration call volume against
      the operational metric (orders placed, ASNs received) rather than dollar-per-call.
  - name: Allocation
    description: Allocate integration costs to the procurement / supply-chain function that owns
      the UNFI commercial relationship.
  - name: Optimization
    description: Optimize via order batching, EDI usage, and supplier collaboration rather than per-call
      pricing.
  - name: Accountability
    description: Assign ownership to the team that manages the UNFI account; FinOps signals come
      from invoice and SLA review.
